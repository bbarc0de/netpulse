<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NetPulse — Understand your internet beyond speed</title>
    <meta
      name="description"
      content="NetPulse measures performance, exposes instability, and explains what affects your connection — download, upload, latency under load, jitter, bufferbloat — with honest, transparent methodology."
    />
    <script>
      // Theme before first paint — no flash. Dark is the default.
      (function () {
        try {
          var t = localStorage.getItem("netpulse_theme");
          document.documentElement.classList.toggle("dark", t !== "light");
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;700&family=Exo+2:ital,wght@1,800;1,900&family=Baloo+2:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
