<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NetPulse — Understand your internet beyond speed</title>
    <meta
      name="description"
      content="NetPulse measures performance, exposes instability, and explains what affects your connection — download, upload, latency under load, jitter, bufferbloat — with honest, transparent methodology."
    />
    <script>
      // Theme before first paint — no flash. Dark is the default.
      (function () {
        try {
          var t = localStorage.getItem("netpulse_theme");
          document.documentElement.classList.toggle("dark", t !== "light");
        } catch {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
